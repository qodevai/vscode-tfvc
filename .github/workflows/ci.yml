name: CI

on:
  push:
    branches: [main]
    tags: ['v*']
  pull_request:
    branches: [main]

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '24'
          cache: 'npm'
      - run: npm ci
      - run: npm run compile
      - run: npm test
      # Extension-host e2e — launches a real VS Code under xvfb. Needs a
      # display server because @vscode/test-electron spawns the Electron
      # binary, which initializes a window even when no UI is shown.
      - name: Install xvfb
        run: sudo apt-get update && sudo apt-get install -y xvfb
      - name: Run e2e (extension host)
        run: xvfb-run -a npm run test:e2e
      - run: npx @vscode/vsce package --no-dependencies --out tfvc.vsix
      - uses: actions/upload-artifact@v4
        with:
          name: tfvc-vsix
          path: tfvc.vsix
          retention-days: 30

  publish:
    needs: test
    if: startsWith(github.ref, 'refs/tags/v')
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '24'
          cache: 'npm'
      - run: npm ci
      - name: Verify package.json version matches tag
        run: |
          PKG_VERSION=$(node -p "require('./package.json').version")
          TAG_VERSION="${GITHUB_REF_NAME#v}"
          test "$PKG_VERSION" = "$TAG_VERSION" || (echo "package.json version $PKG_VERSION != tag $TAG_VERSION" && exit 1)
      - run: npm run compile
      - run: npx @vscode/vsce publish --pat "$VSCE_PAT" --no-dependencies
        env:
          VSCE_PAT: ${{ secrets.VSCE_PAT }}
